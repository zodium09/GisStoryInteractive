<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" role="img" aria-labelledby="title desc">
  <title id="title">การแผ่รังสีและงบพลังงานของโลก</title>
  <desc id="desc">แผนภาพเชิงคุณภาพแสดงรังสีคลื่นสั้นจากดวงอาทิตย์ การสะท้อนและดูดกลืนโดยเมฆ บรรยากาศ และพื้นผิว รังสีคลื่นยาวจากโลก การดูดกลืนและแผ่รังสีกลับของก๊าซเรือนกระจก และสมดุลพลังงานที่ระดับบนบรรยากาศ โดยแยกการไหลของพลังงานออกจากแหล่งกักเก็บ</desc>
  <metadata><![CDATA[
  {
    "topicTH": "การแผ่รังสีและงบพลังงาน",
    "visualKind": "energy-budget",
    "productionMode": "deterministic-svg",
    "dataMode": "qualitative-no-percent-or-watt-values",
    "reviewedAgainst": [
      "https://science.nasa.gov/ems/13_radiationbudget/",
      "https://science.nasa.gov/earth/earth-observatory/climate-and-earths-energy-budget/",
      "https://www.nasa.gov/general/what-is-earths-atmosphere/",
      "https://csl.noaa.gov/research/erb/about.html",
      "https://gml.noaa.gov/grad/about/rad.html"
    ],
    "scopeTH": "ภาพอธิบายทิศทางและกระบวนการ ไม่แสดงขนาดฟลักซ์ จึงไม่มีค่าร้อยละหรือวัตต์ต่อตารางเมตร",
    "keyCaveatTH": "ก๊าซเรือนกระจกกระจายอยู่ในบรรยากาศและดูดกลืนเฉพาะบางช่วงคลื่น ไม่ใช่ชั้นกระจกทึบ"
  }
  ]]></metadata>

  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142944"/>
      <stop offset="1" stop-color="#24496F"/>
    </linearGradient>
    <linearGradient id="atmosphere" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BFE6F0" stop-opacity="0.58"/>
      <stop offset="0.58" stop-color="#DDF3F3" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#EEF8EC" stop-opacity="0.93"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#76A56D"/>
      <stop offset="1" stop-color="#406C55"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3F91B8"/>
      <stop offset="1" stop-color="#23658E"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFFBD0"/>
      <stop offset="0.56" stop-color="#FFD65B"/>
      <stop offset="1" stop-color="#F5A623"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#18324A" flood-opacity="0.14"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-sw" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 Z" fill="#F4B63A"/>
    </marker>
    <marker id="arrow-reflect" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 Z" fill="#6BB9E8"/>
    </marker>
    <marker id="arrow-lw" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 Z" fill="#D95F43"/>
    </marker>
    <marker id="arrow-back" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L11 6 L1 11 Z" fill="#A54F7D"/>
    </marker>
    <marker id="arrow-sw-small" markerWidth="17" markerHeight="17" refX="15" refY="8.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L16 8.5 L1 16 Z" fill="#F4B63A"/>
    </marker>
    <marker id="arrow-reflect-small" markerWidth="17" markerHeight="17" refX="15" refY="8.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L16 8.5 L1 16 Z" fill="#6BB9E8"/>
    </marker>
    <marker id="arrow-lw-small" markerWidth="17" markerHeight="17" refX="15" refY="8.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L16 8.5 L1 16 Z" fill="#D95F43"/>
    </marker>
    <marker id="arrow-back-small" markerWidth="17" markerHeight="17" refX="15" refY="8.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L16 8.5 L1 16 Z" fill="#A54F7D"/>
    </marker>
    <style><![CDATA[
      text { font-family: "Noto Sans Thai", "Leelawadee UI", Tahoma, sans-serif; fill: #18324A; }
      .title { font-size: 48px; font-weight: 800; }
      .subtitle { font-size: 22px; font-weight: 500; }
      .section { font-size: 27px; font-weight: 800; }
      .label { font-size: 21px; font-weight: 750; }
      .body { font-size: 18px; font-weight: 500; }
      .small { font-size: 16px; font-weight: 500; }
      .tiny { font-size: 14px; font-weight: 500; }
      .inverse { fill: #FFFFFF; }
      .muted { fill: #526B7C; }
      .card { fill: #FFFFFF; stroke: #B9CBD7; stroke-width: 2; filter: url(#shadow); }
      .flux-sw { fill: none; stroke: #F4B63A; stroke-width: 10; stroke-linecap: round; marker-end: url(#arrow-sw); }
      .flux-reflect { fill: none; stroke: #6BB9E8; stroke-width: 8; stroke-linecap: round; marker-end: url(#arrow-reflect); }
      .flux-lw { fill: none; stroke: #D95F43; stroke-width: 9; stroke-linecap: round; marker-end: url(#arrow-lw); }
      .flux-back { fill: none; stroke: #A54F7D; stroke-width: 8; stroke-linecap: round; marker-end: url(#arrow-back); }
    ]]></style>
  </defs>

  <rect width="1800" height="900" fill="#F7F6F1"/>
  <rect x="0" y="0" width="18" height="900" fill="#325E88"/>

  <!-- Header -->
  <text x="60" y="66" class="title">การแผ่รังสีและงบพลังงานของโลก</text>
  <text x="60" y="105" class="subtitle">ติดตามพลังงานจากดวงอาทิตย์ ผ่านการสะท้อน ดูดกลืน และแผ่กลับสู่อวกาศ</text>
  <rect x="1408" y="34" width="330" height="58" rx="29" fill="#E7EEF4" stroke="#325E88" stroke-width="2"/>
  <text x="1573" y="58" text-anchor="middle" class="small">ภาพเชิงคุณภาพ • ไม่มีค่าร้อยละ</text>
  <text x="1573" y="80" text-anchor="middle" class="tiny">ความหนาลูกศรไม่แทนขนาดฟลักซ์</text>
  <line x1="60" y1="132" x2="1740" y2="132" stroke="#C4D0D8" stroke-width="2"/>

  <!-- Main process field -->
  <g aria-label="เส้นทางพลังงานในระบบโลก">
    <rect x="60" y="154" width="1120" height="632" rx="24" class="card"/>
    <clipPath id="field-clip"><rect x="78" y="172" width="1084" height="596" rx="16"/></clipPath>
    <g clip-path="url(#field-clip)">
      <rect x="78" y="172" width="1084" height="145" fill="url(#space)"/>
      <rect x="78" y="317" width="1084" height="327" fill="url(#atmosphere)"/>
      <rect x="78" y="644" width="1084" height="124" fill="#D8E7D0"/>
      <path d="M78 688 C230 624 341 679 487 654 C622 631 745 692 869 660 C989 629 1092 667 1162 645 L1162 768 L78 768 Z" fill="url(#land)"/>
      <path d="M78 690 C228 650 365 700 518 676 C661 653 812 713 951 680 C1042 658 1112 669 1162 658 L1162 768 L78 768 Z" fill="url(#ocean)" opacity="0.84"/>

      <!-- Stars -->
      <g fill="#FFFFFF" opacity="0.75">
        <circle cx="102" cy="202" r="2"/><circle cx="192" cy="278" r="2.5"/><circle cx="510" cy="210" r="2"/>
        <circle cx="742" cy="250" r="2"/><circle cx="1006" cy="203" r="2.5"/><circle cx="1124" cy="274" r="2"/>
      </g>

      <!-- Sun -->
      <g transform="translate(177 240)" aria-label="ดวงอาทิตย์">
        <g stroke="#FFD45A" stroke-width="5" stroke-linecap="round" opacity="0.95">
          <line x1="0" y1="-64" x2="0" y2="-86"/><line x1="0" y1="64" x2="0" y2="86"/>
          <line x1="-64" y1="0" x2="-86" y2="0"/><line x1="64" y1="0" x2="86" y2="0"/>
          <line x1="-45" y1="-45" x2="-61" y2="-61"/><line x1="45" y1="45" x2="61" y2="61"/>
          <line x1="45" y1="-45" x2="61" y2="-61"/><line x1="-45" y1="45" x2="-61" y2="61"/>
        </g>
        <circle r="51" fill="url(#sun)" filter="url(#glow)"/>
        <text x="0" y="7" text-anchor="middle" class="label">ดวงอาทิตย์</text>
      </g>

      <!-- Top-of-atmosphere boundary -->
      <line x1="78" y1="317" x2="1162" y2="317" stroke="#B9D9E9" stroke-width="3" stroke-dasharray="11 9"/>
      <rect x="825" y="291" width="319" height="49" rx="18" fill="#173451" opacity="0.88"/>
      <text x="984" y="312" text-anchor="middle" class="small inverse">ขอบระบบ: ระดับบนบรรยากาศ</text>
      <text x="984" y="331" text-anchor="middle" class="tiny inverse">ใช้ตรวจสมดุลพลังงานเข้า–ออก</text>

      <!-- Clouds -->
      <g transform="translate(466 392)" aria-label="เมฆ">
        <ellipse cx="0" cy="18" rx="66" ry="24" fill="#FFFFFF" stroke="#7FA9C1" stroke-width="3"/>
        <circle cx="-32" cy="5" r="28" fill="#FFFFFF" stroke="#7FA9C1" stroke-width="3"/>
        <circle cx="7" cy="-7" r="38" fill="#FFFFFF" stroke="#7FA9C1" stroke-width="3"/>
        <circle cx="44" cy="7" r="28" fill="#FFFFFF" stroke="#7FA9C1" stroke-width="3"/>
        <rect x="-58" y="7" width="112" height="31" fill="#FFFFFF"/>
        <text x="0" y="68" text-anchor="middle" class="label">เมฆ</text>
      </g>

      <!-- Greenhouse gases distributed, not a layer -->
      <g aria-label="ก๊าซเรือนกระจกกระจายในบรรยากาศ">
        <g transform="translate(765 402)"><circle r="25" fill="#F7E6ED" stroke="#A54F7D" stroke-width="3"/><text text-anchor="middle" y="6" class="small">H₂O</text></g>
        <g transform="translate(916 476)"><circle r="25" fill="#F7E6ED" stroke="#A54F7D" stroke-width="3"/><text text-anchor="middle" y="6" class="small">CO₂</text></g>
        <g transform="translate(704 548)"><circle r="25" fill="#F7E6ED" stroke="#A54F7D" stroke-width="3"/><text text-anchor="middle" y="6" class="small">CH₄</text></g>
        <g transform="translate(1022 383)"><circle r="25" fill="#F7E6ED" stroke="#A54F7D" stroke-width="3"/><text text-anchor="middle" y="6" class="small">N₂O</text></g>
        <text x="885" y="565" text-anchor="middle" class="small">โมเลกุลกระจายตัว ไม่ใช่ชั้นกระจก</text>
      </g>

      <!-- Incoming shortwave -->
      <path d="M247 269 C326 326 359 444 398 622" class="flux-sw"/>
      <text x="272" y="333" class="label" fill="#8A5A00">คลื่นสั้นเข้า</text>
      <text x="272" y="357" class="small" fill="#8A5A00">แสงอาทิตย์</text>

      <!-- Cloud reflection and atmospheric absorption -->
      <path d="M432 365 C397 318 382 277 367 222" class="flux-reflect"/>
      <text x="345" y="300" text-anchor="end" class="small">สะท้อนโดยเมฆ</text>
      <path d="M320 345 C347 376 358 407 360 448" class="flux-sw" style="stroke-width:6"/>
      <circle cx="360" cy="448" r="11" fill="#F4B63A" opacity="0.72"/>
      <text x="198" y="455" class="small">บรรยากาศดูดกลืนบางส่วน</text>

      <!-- Surface reflection -->
      <path d="M398 622 C349 548 322 469 297 392" class="flux-reflect"/>
      <text x="184" y="536" class="small">สะท้อนโดยพื้นผิว</text>

      <!-- Surface absorption -->
      <circle cx="422" cy="655" r="18" fill="#F4B63A" opacity="0.82"/>
      <path d="M384 650 Q422 668 461 650" fill="none" stroke="#FFF4C2" stroke-width="4"/>
      <text x="281" y="699" class="label inverse">พื้นผิวโลกดูดกลืน</text>
      <text x="281" y="722" class="small inverse">มหาสมุทรและแผ่นดินเก็บพลังงานแล้วอุ่นขึ้น</text>

      <!-- Longwave emitted by surface: direct atmospheric window -->
      <path d="M571 647 C589 536 603 417 623 220" class="flux-lw"/>
      <text x="535" y="566" text-anchor="end" class="label" fill="#973B2A">คลื่นยาวออก</text>
      <text x="535" y="590" text-anchor="end" class="small">อินฟราเรดจากพื้นผิวอุ่น</text>
      <rect x="552" y="206" width="175" height="43" rx="16" fill="#FFF0EB" stroke="#D95F43" stroke-width="2"/>
      <text x="640" y="233" text-anchor="middle" class="small">บางช่วงคลื่นออกตรง</text>

      <!-- Absorption and re-emission by greenhouse gases -->
      <path d="M760 648 C783 580 819 518 895 487" class="flux-lw"/>
      <circle cx="895" cy="487" r="12" fill="#D95F43"/>
      <text x="831" y="607" text-anchor="middle" class="small">ก๊าซเรือนกระจกดูดกลืน</text>
      <path d="M920 463 C968 390 1002 317 1044 224" class="flux-lw"/>
      <text x="1007" y="349" text-anchor="middle" class="small">แผ่ขึ้นสู่อวกาศ</text>
      <path d="M889 510 C851 550 829 595 817 642" class="flux-back"/>
      <text x="965" y="594" text-anchor="middle" class="small" fill="#7E315B">แผ่กลับลงสู่พื้นผิว</text>
      <text x="965" y="618" text-anchor="middle" class="tiny">back-radiation</text>

      <!-- Labels for system reservoirs -->
      <rect x="92" y="588" width="190" height="46" rx="16" fill="#FFFFFF" opacity="0.9" stroke="#6C9F86" stroke-width="2"/>
      <text x="187" y="617" text-anchor="middle" class="label">พื้นผิวโลก</text>
      <rect x="88" y="334" width="190" height="46" rx="16" fill="#FFFFFF" opacity="0.9" stroke="#6EA5BE" stroke-width="2"/>
      <text x="183" y="363" text-anchor="middle" class="label">บรรยากาศ</text>
    </g>

    <!-- In-panel legend: distinguish flux vs stock -->
    <g transform="translate(88 731)">
      <rect width="1042" height="39" rx="15" fill="#EFF4F5" stroke="#B9CBD7" stroke-width="1.5"/>
      <line x1="24" y1="20" x2="86" y2="20" stroke="#F4B63A" stroke-width="7" marker-end="url(#arrow-sw-small)"/>
      <text x="104" y="26" class="small"><tspan font-weight="800">การไหล (flux)</tspan><tspan> = ลูกศรบอกทิศทางกระบวนการ</tspan></text>
      <rect x="563" y="9" width="44" height="22" rx="7" fill="#71A586"/>
      <text x="622" y="26" class="small"><tspan font-weight="800">แหล่งกักเก็บ (stock)</tspan><tspan> = พื้นผิวและบรรยากาศ</tspan></text>
    </g>
  </g>

  <!-- Right-side explanatory cards -->
  <g aria-label="หลักการอ่านงบพลังงาน">
    <rect x="1210" y="154" width="530" height="218" rx="22" class="card"/>
    <text x="1240" y="196" class="section">สมดุลที่ขอบระบบ</text>
    <text x="1240" y="225" class="small muted">เฉลี่ยระยะยาว ณ ระดับบนบรรยากาศ</text>
    <rect x="1240" y="245" width="470" height="61" rx="17" fill="#EAF2F7" stroke="#7DA6C0" stroke-width="2"/>
    <text x="1475" y="282" text-anchor="middle" class="label">คลื่นสั้นเข้า = สะท้อนกลับ + คลื่นยาวออก</text>
    <text x="1240" y="333" class="body">พลังงานเข้ามากกว่าออก → ระบบสะสมพลังงานและอุ่นขึ้น</text>
    <text x="1240" y="358" class="body">พลังงานออกมากกว่าเข้า → ระบบสูญเสียพลังงานและเย็นลง</text>

    <rect x="1210" y="395" width="530" height="245" rx="22" class="card"/>
    <text x="1240" y="437" class="section">เรือนกระจกคือการดูดกลืน–แผ่รังสี</text>
    <g transform="translate(1241 465)">
      <circle cx="24" cy="18" r="17" fill="#F7E6ED" stroke="#A54F7D" stroke-width="2"/>
      <path d="M8 18 H40 M24 2 V34" stroke="#A54F7D" stroke-width="2"/>
      <text x="58" y="17" class="body">ก๊าซเรือนกระจกดูดกลืนคลื่นยาวบางช่วง</text>
      <text x="58" y="41" class="body">แล้วแผ่รังสีออกทุกทิศทาง ทั้งขึ้นและลง</text>
      <path d="M4 81 H45" fill="none" stroke="#D95F43" stroke-width="5" marker-end="url(#arrow-lw-small)"/>
      <text x="58" y="88" class="body">คลื่นยาวส่วนหนึ่งยังหนีออกสู่อวกาศได้</text>
      <path d="M45 121 H4" fill="none" stroke="#A54F7D" stroke-width="5" marker-end="url(#arrow-back-small)"/>
      <text x="58" y="133" class="body">รังสีย้อนกลับเป็นฟลักซ์ภายใน ไม่ใช่พลังงานใหม่</text>
    </g>
    <rect x="1237" y="602" width="476" height="28" rx="14" fill="#FFF4DF"/>
    <text x="1475" y="622" text-anchor="middle" class="small">ไม่ใช่กระจกสะท้อน และไม่ใช่ชั้นทึบครอบโลก</text>

    <rect x="1210" y="660" width="530" height="126" rx="22" class="card"/>
    <text x="1240" y="697" class="section">อ่านสีของลูกศร</text>
    <line x1="1245" y1="724" x2="1300" y2="724" stroke="#F4B63A" stroke-width="7" marker-end="url(#arrow-sw-small)"/>
    <text x="1318" y="731" class="small">ทอง: คลื่นสั้นเข้า</text>
    <line x1="1245" y1="760" x2="1300" y2="760" stroke="#6BB9E8" stroke-width="7" marker-end="url(#arrow-reflect-small)"/>
    <text x="1318" y="767" class="small">ฟ้า: สะท้อนกลับ</text>
    <line x1="1500" y1="724" x2="1555" y2="724" stroke="#D95F43" stroke-width="7" marker-end="url(#arrow-lw-small)"/>
    <text x="1573" y="731" class="small">แดง: คลื่นยาว</text>
    <line x1="1500" y1="760" x2="1555" y2="760" stroke="#A54F7D" stroke-width="7" marker-end="url(#arrow-back-small)"/>
    <text x="1573" y="767" class="small">ม่วง: แผ่ลง</text>
  </g>

  <!-- Footer -->
  <rect x="60" y="812" width="1680" height="55" rx="18" fill="#E9F0F2" stroke="#B9CBD7" stroke-width="1.5"/>
  <text x="900" y="847" text-anchor="middle" class="label">อุณหภูมิโลกขึ้นกับสมดุลพลังงานเข้า ออก และการแลกเปลี่ยนภายในระบบ</text>
  <text x="60" y="892" class="tiny muted">หมายเหตุ: ภาพนี้แสดงเส้นทางเชิงแนวคิด ไม่เปรียบเทียบขนาดฟลักซ์ และไม่รวมการถ่ายเทด้วยการพา–การระเหย</text>
  <text x="1740" y="892" text-anchor="end" class="tiny muted">กรอบอ้างอิง: NASA Radiation Budget • NASA Earth Observatory • NOAA ERB / GML</text>
</svg>
