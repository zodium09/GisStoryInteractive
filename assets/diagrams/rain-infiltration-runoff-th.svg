<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" width="1800" height="900" role="img" aria-labelledby="rain-runoff-title rain-runoff-desc">
  <title id="rain-runoff-title">ฝน การซึม และการเกิดน้ำไหลบ่า</title>
  <desc id="rain-runoff-desc">แผนภาพตำราเปรียบเทียบการตอบสนองต่อฝนเหตุการณ์เดียวกันในสามพื้นที่ ได้แก่ พื้นที่พืชปกคลุมที่ดินยังซึมน้ำได้ พื้นที่ซึ่งดินบางส่วนอิ่มน้ำ และเมืองที่มีผิวทึบน้ำ แสดงการกักน้ำบนเรือนยอด กำลังการซึม การกักตามแอ่งตื้น การซึมลงดิน น้ำไหลบ่าแบบดินอิ่มน้ำ และน้ำไหลบ่าแบบฝนเกินกำลังซึม โดยไม่กำหนดตัวเลขหรือสัดส่วนปริมาณ</desc>

  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>ฝน การซึม และการเกิดน้ำไหลบ่า</dc:title>
        <dc:description>Deterministic textbook-atlas mechanism schematic. Arrow sizes and stored-water areas are qualitative; no quantitative fractions are implied.</dc:description>
        <dc:source>https://www.usgs.gov/water-science-school/science/infiltration-and-water-cycle</dc:source>
        <dc:source>https://www.usgs.gov/water-science-school/science/runoff-surface-and-overland-water-runoff</dc:source>
        <dc:source>https://www.usgs.gov/water-science-school/science/surface-runoff-and-water-cycle</dc:source>
        <dc:source>https://www.usgs.gov/water-science-school/science/watersheds-and-drainage-basins</dc:source>
      </rdf:Description>
    </rdf:RDF>
  </metadata>

  <defs>
    <linearGradient id="atlas-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#edf8ff"/>
      <stop offset="1" stop-color="#fbfdff"/>
    </linearGradient>
    <linearGradient id="soil-unsat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c48a55"/>
      <stop offset="1" stop-color="#8a5d3b"/>
    </linearGradient>
    <linearGradient id="soil-wet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86c9dd" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#4c9ebd" stop-opacity="0.98"/>
    </linearGradient>
    <pattern id="soil-grains" width="32" height="26" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="3" fill="#6f472f" fill-opacity="0.20"/>
      <circle cx="24" cy="18" r="2.5" fill="#6f472f" fill-opacity="0.18"/>
    </pattern>
    <pattern id="urban-hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#75828c" stroke-width="3"/>
    </pattern>
    <filter id="atlas-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14354a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow-rain" markerWidth="15" markerHeight="15" refX="13" refY="7.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L15,7.5 L0,15 Z" fill="#1975ad"/>
    </marker>
    <marker id="arrow-infiltration" markerWidth="15" markerHeight="15" refX="13" refY="7.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L15,7.5 L0,15 Z" fill="#087f8c"/>
    </marker>
    <marker id="arrow-runoff" markerWidth="15" markerHeight="15" refX="13" refY="7.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L15,7.5 L0,15 Z" fill="#145f88"/>
    </marker>
    <marker id="arrow-intercept" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#4a8a46"/>
    </marker>
    <symbol id="rain-cloud" viewBox="0 0 260 135">
      <g fill="#ffffff" stroke="#8aaabd" stroke-width="3">
        <ellipse cx="130" cy="52" rx="92" ry="38"/>
        <circle cx="82" cy="46" r="38"/>
        <circle cx="132" cy="29" r="48"/>
        <circle cx="180" cy="48" r="39"/>
      </g>
      <g fill="none" stroke="#1975ad" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-rain)">
        <path d="M65 88 L65 127"/>
        <path d="M105 88 L105 127"/>
        <path d="M145 88 L145 127"/>
        <path d="M185 88 L185 127"/>
      </g>
    </symbol>
    <style>
      text { font-family: "Noto Sans Thai", Tahoma, sans-serif; fill: #102f46; }
      .title { font-size: 48px; font-weight: 700; }
      .subtitle { font-size: 22px; font-weight: 500; fill: #3d6075; }
      .panel-title { font-size: 29px; font-weight: 700; }
      .label { font-size: 21px; font-weight: 700; }
      .small { font-size: 18px; font-weight: 500; }
      .tiny { font-size: 16px; font-weight: 500; }
      .inverse { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #a8c2d2; stroke-width: 3; }
      .condition { fill: #eef7fb; stroke: #6f98b0; stroke-width: 2.5; }
      .note { fill: #fff8e8; stroke: #c27a20; stroke-width: 2.5; }
      .rain-path { fill: none; stroke: #1975ad; stroke-width: 7; stroke-linecap: round; marker-end: url(#arrow-rain); }
      .infiltration-path { fill: none; stroke: #087f8c; stroke-width: 7; stroke-linecap: round; stroke-dasharray: 5 10; marker-end: url(#arrow-infiltration); }
      .runoff-path { fill: none; stroke: #145f88; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-runoff); }
      .intercept-path { fill: none; stroke: #4a8a46; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 13 8; marker-end: url(#arrow-intercept); }
      .leader { fill: none; stroke: #536d7d; stroke-width: 2.5; }
    </style>
  </defs>

  <rect width="1800" height="900" fill="#f5f9fc"/>
  <rect width="1800" height="720" fill="url(#atlas-sky)"/>

  <text x="54" y="66" class="title">ฝน การซึม และการเกิดน้ำไหลบ่า</text>
  <text x="56" y="102" class="subtitle">ฝนเหตุการณ์เดียวกัน • การตอบสนองต่างกันตามสภาพผิวดิน ความชื้นเดิม และกำลังการซึม</text>
  <g transform="translate(1385 26)">
    <rect width="360" height="68" rx="20" class="condition"/>
    <text x="180" y="29" text-anchor="middle" class="small">ภาพจำลองเชิงกลไก • ไม่มีค่าปริมาณ</text>
    <text x="180" y="53" text-anchor="middle" class="tiny">ขนาดลูกศรไม่แทนสัดส่วนของน้ำ</text>
  </g>

  <!-- Panel 1: infiltrable, initially unsaturated land -->
  <g transform="translate(36 126)" filter="url(#atlas-shadow)">
    <rect width="558" height="604" rx="28" class="panel"/>
    <rect x="20" y="18" width="518" height="56" rx="20" fill="#eaf5e6" stroke="#76a66a" stroke-width="2.5"/>
    <text x="279" y="55" text-anchor="middle" class="panel-title">1 พื้นที่ซึมได้และยังไม่อิ่มน้ำ</text>

    <use href="#rain-cloud" x="149" y="84" width="260" height="135"/>
    <text x="279" y="104" text-anchor="middle" class="tiny">ฝนเหตุการณ์เดียวกัน</text>

    <rect x="58" y="221" width="442" height="48" rx="17" class="condition"/>
    <text x="279" y="252" text-anchor="middle" class="small">เมื่ออัตราฝนยังไม่เกินกำลังการซึม ณ ขณะนั้น</text>

    <!-- vegetation and interception -->
    <g transform="translate(42 273)">
      <path d="M0 94 C78 59 142 76 209 86 C283 97 351 80 465 107 L465 284 L0 284 Z" fill="url(#soil-unsat)" stroke="#795338" stroke-width="3"/>
      <path d="M0 94 C78 59 142 76 209 86 C283 97 351 80 465 107" fill="none" stroke="#4f7a3e" stroke-width="15" stroke-linejoin="round"/>
      <path d="M0 94 C78 59 142 76 209 86 C283 97 351 80 465 107 L465 284 L0 284 Z" fill="url(#soil-grains)"/>
      <g fill="#3f8044" stroke="#2d6336" stroke-width="2">
        <circle cx="92" cy="36" r="33"/><circle cx="126" cy="49" r="29"/><circle cx="62" cy="55" r="28"/>
        <path d="M91 61 V102" stroke="#79513a" stroke-width="11"/>
        <circle cx="270" cy="48" r="28"/><circle cx="299" cy="61" r="25"/><circle cx="244" cy="65" r="24"/>
        <path d="M270 71 V98" stroke="#79513a" stroke-width="10"/>
      </g>

      <path d="M44 32 C64 19 90 18 111 30" class="intercept-path"/>
      <path d="M231 47 C250 34 273 34 294 46" class="intercept-path"/>
      <text x="9" y="12" class="tiny" fill="#356b3c">การกักบนเรือนยอด</text>

      <path d="M165 93 C165 139 165 179 165 222" class="infiltration-path"/>
      <path d="M258 99 C258 145 258 187 258 235" class="infiltration-path"/>
      <path d="M349 97 C349 137 349 176 349 219" class="infiltration-path"/>
      <text x="258" y="177" text-anchor="middle" class="label" fill="#086e79">การซึม</text>
      <text x="258" y="201" text-anchor="middle" class="tiny">เติมความชื้นในช่องว่างของดิน</text>

      <!-- depression storage -->
      <path d="M362 105 Q398 129 438 108 Q425 138 390 138 Q369 135 362 105 Z" fill="#77c9e3" stroke="#247fa2" stroke-width="2.5"/>
      <path d="M357 91 L437 112" class="leader"/>
      <text x="352" y="74" text-anchor="middle" class="tiny">การกักตามแอ่งตื้น</text>

      <path d="M370 93 C402 92 430 99 462 110" class="runoff-path"/>
      <text x="407" y="166" text-anchor="middle" class="tiny">หากแอ่งเต็ม จึงล้นสู่ทางน้ำ</text>
      <path d="M462 107 C472 109 480 111 488 113" fill="none" stroke="#2d9fc6" stroke-width="22" stroke-linecap="round"/>
    </g>

    <g transform="translate(38 555)">
      <rect width="482" height="34" rx="15" fill="#edf8f5" stroke="#63a89b" stroke-width="2"/>
      <text x="241" y="23" text-anchor="middle" class="tiny">เรือนยอด แอ่งตื้น และดิน แบ่งรับน้ำก่อนถึงลำน้ำ</text>
    </g>
  </g>

  <!-- Panel 2: saturation-excess -->
  <g transform="translate(621 126)" filter="url(#atlas-shadow)">
    <rect width="558" height="604" rx="28" class="panel"/>
    <rect x="20" y="18" width="518" height="56" rx="20" fill="#e5f4fa" stroke="#5d9bb5" stroke-width="2.5"/>
    <text x="279" y="55" text-anchor="middle" class="panel-title">2 ดินบางส่วนอิ่มน้ำ</text>

    <use href="#rain-cloud" x="149" y="84" width="260" height="135"/>
    <text x="279" y="104" text-anchor="middle" class="tiny">ฝนเหตุการณ์เดียวกัน</text>

    <rect x="58" y="221" width="442" height="48" rx="17" class="condition"/>
    <text x="279" y="252" text-anchor="middle" class="small">พื้นที่ลุ่มใกล้ทางน้ำไม่มีช่องว่างกักเพิ่ม</text>

    <g transform="translate(42 273)">
      <!-- sloping soil -->
      <path d="M0 72 C105 57 184 72 269 91 C345 108 410 113 465 112 L465 284 L0 284 Z" fill="url(#soil-unsat)" stroke="#795338" stroke-width="3"/>
      <path d="M0 72 C105 57 184 72 269 91 C345 108 410 113 465 112" fill="none" stroke="#4f7a3e" stroke-width="15"/>
      <path d="M0 72 C105 57 184 72 269 91 C345 108 410 113 465 112 L465 284 L0 284 Z" fill="url(#soil-grains)"/>

      <!-- saturated zone rises to the surface near stream -->
      <path d="M0 232 C120 222 208 193 287 158 C358 127 403 108 465 108 L465 284 L0 284 Z" fill="url(#soil-wet)" stroke="#2d7f9e" stroke-width="3"/>
      <path d="M0 232 C120 222 208 193 287 158 C358 127 403 108 465 108" fill="none" stroke="#246f8b" stroke-width="4" stroke-dasharray="12 8"/>
      <text x="133" y="254" class="tiny" fill="#0e5c78">เขตดินอิ่มน้ำ</text>
      <text x="177" y="221" class="tiny">ระดับน้ำใต้ดินลาดขึ้นสู่ผิว</text>

      <!-- infiltration remains possible upslope -->
      <path d="M95 68 C95 103 95 136 95 169" class="infiltration-path"/>
      <path d="M182 75 C182 105 182 129 182 153" class="infiltration-path"/>
      <text x="130" y="129" text-anchor="middle" class="tiny" fill="#086e79">ยังซึมได้บนพื้นที่สูง</text>

      <!-- saturation excess from the saturated patch -->
      <path d="M302 98 C339 111 377 116 424 115" class="runoff-path"/>
      <path d="M424 115 C446 115 468 115 488 116" fill="none" stroke="#2d9fc6" stroke-width="24" stroke-linecap="round"/>
      <text x="354" y="31" text-anchor="middle" class="label" fill="#145f88">น้ำไหลบ่าจากเขตอิ่มน้ำ</text>
      <text x="355" y="55" text-anchor="middle" class="tiny">ฝนเพิ่มลงบนบริเวณที่กักต่อไม่ได้</text>
    </g>

    <g transform="translate(38 535)">
      <rect width="482" height="54" rx="17" class="condition"/>
      <text x="241" y="23" text-anchor="middle" class="label">น้ำไหลบ่าแบบดินอิ่มน้ำ</text>
      <text x="241" y="44" text-anchor="middle" class="tiny">saturation-excess runoff • ไม่จำเป็นต้องเกิดทั่วทั้งพื้นที่</text>
    </g>
  </g>

  <!-- Panel 3: urban and infiltration-excess -->
  <g transform="translate(1206 126)" filter="url(#atlas-shadow)">
    <rect width="558" height="604" rx="28" class="panel"/>
    <rect x="20" y="18" width="518" height="56" rx="20" fill="#f0eff5" stroke="#8a819c" stroke-width="2.5"/>
    <text x="279" y="55" text-anchor="middle" class="panel-title">3 เมืองที่มีผิวทึบน้ำ</text>

    <use href="#rain-cloud" x="149" y="84" width="260" height="135"/>
    <text x="279" y="104" text-anchor="middle" class="tiny">ฝนเหตุการณ์เดียวกัน</text>

    <rect x="58" y="221" width="442" height="48" rx="17" class="condition"/>
    <text x="279" y="252" text-anchor="middle" class="small">อัตราฝนเกินกำลังการซึมของผิว ณ ขณะนั้น</text>

    <g transform="translate(42 273)">
      <!-- urban surface and shallow soil -->
      <path d="M0 108 H465 V284 H0 Z" fill="url(#soil-unsat)" stroke="#795338" stroke-width="3"/>
      <path d="M0 108 H465 V150 H0 Z" fill="url(#urban-hatch)" stroke="#626d76" stroke-width="3"/>

      <!-- building, roof, gutter -->
      <path d="M28 76 L93 25 L158 76 Z" fill="#6f8090" stroke="#485866" stroke-width="3"/>
      <rect x="43" y="76" width="100" height="72" fill="#e4e9ed" stroke="#586876" stroke-width="3"/>
      <rect x="79" y="102" width="28" height="46" fill="#9fb4c2"/>
      <path d="M158 75 V105 C158 119 176 119 176 133" class="runoff-path"/>
      <text x="94" y="12" text-anchor="middle" class="tiny">หลังคาและถนนทึบน้ำ</text>

      <!-- road, puddle/depression and drain -->
      <rect x="151" y="93" width="246" height="57" fill="#74808a"/>
      <line x1="170" y1="121" x2="376" y2="121" stroke="#f6d66b" stroke-width="4" stroke-dasharray="19 14"/>
      <path d="M217 98 Q248 118 280 98 Q271 122 244 122 Q225 119 217 98 Z" fill="#70c2df" stroke="#247fa2" stroke-width="2"/>
      <text x="245" y="76" text-anchor="middle" class="tiny">การกักตามแอ่งตื้น</text>
      <path d="M176 134 C235 145 292 143 351 136" class="runoff-path"/>
      <g transform="translate(352 120)">
        <rect width="48" height="31" rx="5" fill="#3f4e58"/>
        <path d="M7 8 H41 M7 16 H41 M7 24 H41" stroke="#a8b6c0" stroke-width="3"/>
      </g>
      <path d="M400 136 C426 136 451 132 480 128" class="runoff-path"/>
      <text x="372" y="174" text-anchor="middle" class="tiny">ท่อระบายน้ำส่งต่อเร็ว</text>

      <!-- pervious pocket: not all rain becomes runoff -->
      <rect x="397" y="76" width="68" height="74" fill="#88ad68" stroke="#547943" stroke-width="2"/>
      <circle cx="431" cy="57" r="28" fill="#3f8044" stroke="#2d6336" stroke-width="2"/>
      <path d="M431 76 V105" stroke="#79513a" stroke-width="9"/>
      <path d="M431 146 C431 183 431 216 431 245" class="infiltration-path"/>
      <path d="M405 50 C421 39 440 39 456 50" class="intercept-path"/>
      <text x="382" y="214" text-anchor="end" class="tiny" fill="#086e79">พื้นที่ซึมได้ยังรับน้ำบางส่วน</text>
    </g>

    <g transform="translate(38 535)">
      <rect width="482" height="54" rx="17" class="note"/>
      <text x="241" y="23" text-anchor="middle" class="label">น้ำไหลบ่าแบบฝนเกินกำลังซึม</text>
      <text x="241" y="44" text-anchor="middle" class="tiny">infiltration-excess runoff • ทางระบายน้ำเร่งการส่งต่อ</text>
    </g>
  </g>

  <!-- Shared conceptual contract and legend -->
  <g transform="translate(36 754)">
    <rect width="1728" height="120" rx="25" fill="#ffffff" stroke="#abc3d2" stroke-width="2.5"/>
    <text x="30" y="32" class="small">เส้นทางน้ำ</text>
    <path d="M150 25 H220" class="rain-path"/>
    <text x="242" y="32" class="tiny">ฝน</text>
    <path d="M318 25 H388" class="infiltration-path"/>
    <text x="410" y="32" class="tiny">การซึม</text>
    <path d="M504 25 H574" class="runoff-path"/>
    <text x="596" y="32" class="tiny">น้ำไหลบ่า/ทางน้ำ</text>
    <path d="M787 25 H857" class="intercept-path"/>
    <text x="879" y="32" class="tiny">การกักบนเรือนยอด</text>
    <path d="M1093 21 Q1122 42 1151 21 Q1142 47 1119 47 Q1101 44 1093 21 Z" fill="#70c2df" stroke="#247fa2" stroke-width="2"/>
    <text x="1170" y="32" class="tiny">การกักตามแอ่งตื้น</text>
    <g transform="translate(1375 8)">
      <rect width="318" height="40" rx="15" class="condition"/>
      <text x="159" y="26" text-anchor="middle" class="tiny">กำลังการซึมเปลี่ยนตามดิน ความชื้น และผิวปกคลุม</text>
    </g>

    <line x1="30" y1="58" x2="1698" y2="58" stroke="#d3e0e7" stroke-width="2"/>
    <text x="864" y="85" text-anchor="middle" class="small">ฝนไม่ใช่ทุกหยดจะกลายเป็นน้ำไหลบ่า: บางส่วนถูกเรือนยอดกัก เก็บตามแอ่งตื้น ซึมลงดิน หรือกลับสู่อากาศ</text>
    <text x="864" y="109" text-anchor="middle" class="tiny" fill="#6c4918">ชนิดและตำแหน่งของน้ำไหลบ่าขึ้นกับอัตราฝน กำลังการซึม ความอิ่มน้ำเดิม ภูมิประเทศ และโครงข่ายระบายน้ำ</text>
  </g>
</svg>
